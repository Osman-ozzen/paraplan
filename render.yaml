services:
  - type: web
    name: butce-takip
    runtime: node
    buildCommand: npm install && npx vite build
    startCommand: node server/index.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
